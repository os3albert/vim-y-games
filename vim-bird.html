<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vim-y Bird</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: 'Fira Code', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
        }
        .retro-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff41;
            padding: 20px;
            text-align: center;
            pointer-events: auto;
        }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="menu" class="retro-box">
            <h1 class="text-4xl font-bold mb-4">VIM-Y BIRD</h1>
            <p class="mb-2">Esci dal buffer infinito!</p>
            <div class="text-left inline-block mb-6">
                <p>⌨️ <span class="font-bold">k</span>: Salta (Up)</p>
                <p>⌨️ <span class="font-bold">j</span>: Picchiata (Down)</p>
                <p>📱 <span class="font-bold">Swipe</span>: Muoviti</p>
            </div>
            <p class="blink">Premi 'k' o tocca per iniziare</p>
        </div>
        
        <div id="game-over" class="retro-box hidden">
            <h2 class="text-3xl font-bold mb-2 text-red-500">SEGFAULT!</h2>
            <p id="final-score" class="text-xl mb-4">Score: 0</p>
            <p class="blink">Premi 'k' per riprovare</p>
        </div>

        <div id="hud" class="absolute top-5 left-5 text-2xl font-bold hidden">
            SCORE: <span id="current-score">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const gameOverScreen = document.getElementById('game-over');
        const hud = document.getElementById('hud');
        const currentScoreElement = document.getElementById('current-score');
        const finalScoreElement = document.getElementById('final-score');

        // Impostazioni di gioco
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        let score = 0;
        let pipes = [];
        let frameCount = 0;

        const bird = {
            x: 50,
            y: 0,
            width: 30,
            height: 24,
            gravity: 0.25,
            lift: -6,
            velocity: 0,
            terminalVelocity: 8,
            draw() {
                ctx.fillStyle = '#00ff41';
                ctx.font = 'bold 24px "Fira Code"';
                ctx.fillText('>', this.x, this.y + this.height);
                
                // Effetto scia
                ctx.globalAlpha = 0.3;
                ctx.fillText('>', this.x - 10, this.y + this.height);
                ctx.globalAlpha = 1.0;
            },
            update() {
                this.velocity += this.gravity;
                if (this.velocity > this.terminalVelocity) this.velocity = this.terminalVelocity;
                this.y += this.velocity;

                if (this.y + this.height > canvas.height) {
                    this.y = canvas.height - this.height;
                    endGame();
                }
                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
            },
            jump() {
                this.velocity = this.lift;
            },
            dive() {
                this.velocity += 4;
            }
        };

        class Pipe {
            constructor() {
                this.spacing = 180; // Spazio tra i tubi
                this.top = Math.random() * (canvas.height / 2) + 50;
                this.bottom = canvas.height - (this.top + this.spacing);
                this.x = canvas.width;
                this.w = 60;
                this.speed = 3;
                this.passed = false;
            }

            draw() {
                ctx.fillStyle = '#003300';
                ctx.strokeStyle = '#00ff41';
                ctx.lineWidth = 2;

                // Tubo superiore
                ctx.fillRect(this.x, 0, this.w, this.top);
                ctx.strokeRect(this.x, 0, this.w, this.top);
                
                // Disegna caratteri casuali nel "codice" del tubo
                ctx.fillStyle = '#00ff41';
                ctx.font = '12px "Fira Code"';
                for(let i=20; i < this.top; i+=20) {
                    ctx.fillText(' {; } ', this.x + 5, i);
                }

                // Tubo inferiore
                ctx.fillStyle = '#003300';
                ctx.fillRect(this.x, canvas.height - this.bottom, this.w, this.bottom);
                ctx.strokeRect(this.x, canvas.height - this.bottom, this.w, this.bottom);
                
                ctx.fillStyle = '#00ff41';
                for(let i=canvas.height - this.bottom + 20; i < canvas.height; i+=20) {
                    ctx.fillText(' [ ] ', this.x + 5, i);
                }
            }

            update() {
                this.x -= this.speed;
            }

            collide(bird) {
                if (bird.x + bird.width > this.x && bird.x < this.x + this.w) {
                    if (bird.y < this.top || bird.y + bird.height > canvas.height - this.bottom) {
                        return true;
                    }
                }
                return false;
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bird.y = canvas.height / 2;
        }

        function initGame() {
            score = 0;
            pipes = [];
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            frameCount = 0;
            currentScoreElement.innerText = score;
        }

        function startGame() {
            initGame();
            gameState = 'PLAYING';
            menu.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
        }

        function endGame() {
            gameState = 'GAMEOVER';
            finalScoreElement.innerText = `SCORE: ${score}`;
            gameOverScreen.classList.remove('hidden');
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            if (gameState === 'MENU' || gameState === 'GAMEOVER') {
                if (e.key === 'k') startGame();
                return;
            }

            if (e.key === 'k') bird.jump();
            if (e.key === 'j') bird.dive();
        });

        // Touch handling (Swipe)
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            if (gameState === 'MENU' || gameState === 'GAMEOVER') {
                startGame();
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;

            if (gameState === 'PLAYING') {
                if (diff > 20) { // Swipe Up
                    bird.jump();
                } else if (diff < -20) { // Swipe Down
                    bird.dive();
                } else {
                    // Tap semplice -> Salta
                    bird.jump();
                }
            }
        }, { passive: false });

        function update() {
            if (gameState !== 'PLAYING') return;

            bird.update();

            if (frameCount % 100 === 0) {
                pipes.push(new Pipe());
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].update();

                if (pipes[i].collide(bird)) {
                    endGame();
                }

                if (!pipes[i].passed && pipes[i].x + pipes[i].w < bird.x) {
                    score++;
                    pipes[i].passed = true;
                    currentScoreElement.innerText = score;
                }

                if (pipes[i].x + pipes[i].w < 0) {
                    pipes.splice(i, 1);
                }
            }

            frameCount++;
        }

        function draw() {
            // Sfondo con griglia retro
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#001a00';
            ctx.lineWidth = 1;
            for(let x=0; x<canvas.width; x+=40) {
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for(let y=0; y<canvas.height; y+=40) {
                ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            pipes.forEach(pipe => pipe.draw());
            bird.draw();

            if (gameState === 'PLAYING') {
                // Effetto scanline
                ctx.fillStyle = 'rgba(0, 255, 65, 0.03)';
                for(let i=0; i<canvas.height; i+=4) {
                    ctx.fillRect(0, i, canvas.width, 1);
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', resize);
        resize();
        gameLoop();
    </script>
</body>
</html>
