<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vim-y Bird - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import Font: Fira Code per TUI, Roboto per Material */
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Roboto:wght@400;700&display=swap');
        
        :root {
            --bg-color: #0d0d0d;
            --primary-color: #00ff41;
            --secondary-color: #003300;
            --grid-color: #001a00;
            --card-bg: rgba(0, 0, 0, 0.9);
            --text-color: #00ff41;
            --font-family: 'Fira Code', monospace;
            --crt-display: block;
            --border-color: #00ff41;
            --shadow-color: rgba(0, 255, 65, 0.2);
            --text-shadow: 0 0 5px var(--primary-color);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            touch-action: none;
            transition: background-color 0.3s, color 0.3s;
        }

        canvas { display: block; }

        /* UI Overlay Layer */
        .ui-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-shadow: var(--text-shadow);
        }

        .retro-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 2.5rem;
            text-align: center;
            pointer-events: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px var(--shadow-color);
            transition: all 0.3s ease;
        }

        /* Stili per i bottoni */
        .custom-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
            color: var(--text-color);
            transition: all 0.2s ease;
            cursor: pointer;
            background: transparent;
        }
        .custom-btn:hover { background: var(--secondary-color); }
        .custom-btn.active { 
            background: var(--primary-color); 
            color: var(--bg-color); 
            text-shadow: none;
        }
        
        /* Contenitori informativi */
        .info-box {
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 0.25rem;
            background: rgba(0,0,0,0.1);
        }
        .info-title {
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.5rem;
            padding-bottom: 0.25rem;
        }
        .key-badge {
            background: var(--primary-color);
            color: var(--bg-color);
            padding: 0 0.25rem;
            font-weight: bold;
            text-shadow: none;
        }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Stili per il Menu Vim */
        .menu-row {
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .menu-row:hover { background: rgba(255, 255, 255, 0.05); }
        .menu-row.active { background: var(--secondary-color); }
        .menu-cursor { width: 25px; display: inline-block; color: var(--primary-color); font-weight: bold;}
        .menu-label { width: 130px; display: inline-block; opacity: 0.8; }
        .menu-value { color: var(--primary-color); }
        .menu-value-dim { opacity: 0.4; }

        /* Effetto CRT opzionale */
        .crt-overlay::before {
            content: " ";
            display: var(--crt-display);
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="crt-overlay">

    <div class="ui-container">
        <!-- Menu Principale -->
        <div id="menu" class="retro-card" style="width: 90%; max-width: 600px;">
            <h1 class="text-6xl font-bold mb-2 tracking-tighter">VIM-Y BIRD</h1>
            <p class="mb-4 opacity-70">Sopravvivi al buffer infinito</p>
            
            <div class="mb-6 text-sm text-left opacity-80 info-box">
                <p class="info-title">Comandi di Navigazione</p>
                <p><span class="key-badge">k</span> / <span class="key-badge">j</span> : Su / Giù</p>
                <p><span class="key-badge">h</span> / <span class="key-badge">l</span> : Cambia Opzione</p>
                <p><span class="key-badge">Enter</span> : Seleziona / Avvia</p>
                <p class="mt-2 text-xs italic opacity-70">(Touch: tocca le righe per cambiare configurazione)</p>
            </div>

            <!-- Menu Vim Generato Dinamicamente -->
            <div id="vim-menu" class="text-left font-bold text-base md:text-lg flex flex-col gap-1 mb-2">
                <!-- Contenuto popolato dal JS -->
            </div>
        </div>
        
        <!-- Schermata Fine Partita -->
        <div id="game-over" class="retro-card hidden">
            <h2 class="text-5xl font-bold mb-2 text-red-500" style="text-shadow: none;">SEGFAULT!</h2>
            <p id="final-score" class="text-3xl mb-8">Score: 0</p>
            <div class="flex flex-col gap-4 items-center">
                <p class="blink text-lg">Premi 'k' per riavviare</p>
                <button id="btn-menu" class="custom-btn text-sm uppercase tracking-widest mt-2">Torna al Menu (m)</button>
            </div>
        </div>

        <!-- Score HUD -->
        <div id="hud" class="absolute top-10 left-10 text-4xl font-bold hidden tabular-nums">
            SCORE: <span id="current-score">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * DIZIONARIO TEMI
         */
        const THEMES = {
            matrix: {
                '--bg-color': '#0d0d0d',
                '--primary-color': '#00ff41',
                '--secondary-color': '#003300',
                '--grid-color': '#001a00',
                '--card-bg': 'rgba(0, 0, 0, 0.9)',
                '--text-color': '#00ff41',
                '--font-family': '"Fira Code", monospace',
                '--crt-display': 'block',
                '--border-color': '#00ff41',
                '--shadow-color': 'rgba(0, 255, 65, 0.2)',
                '--text-shadow': '0 0 5px var(--primary-color)'
            },
            tokyo: {
                '--bg-color': '#1a1b26',
                '--primary-color': '#7aa2f7',
                '--secondary-color': '#24283b',
                '--grid-color': '#414868',
                '--card-bg': 'rgba(26, 27, 38, 0.95)',
                '--text-color': '#c0caf5',
                '--font-family': '"Fira Code", monospace',
                '--crt-display': 'none',
                '--border-color': '#7aa2f7',
                '--shadow-color': 'rgba(122, 162, 247, 0.2)',
                '--text-shadow': 'none'
            },
            material: {
                '--bg-color': '#fafafa',
                '--primary-color': '#6200ea',
                '--secondary-color': '#e0e0e0',
                '--grid-color': '#eeeeee',
                '--card-bg': '#ffffff',
                '--text-color': '#212121',
                '--font-family': '"Roboto", sans-serif',
                '--crt-display': 'none',
                '--border-color': '#e0e0e0',
                '--shadow-color': 'rgba(0, 0, 0, 0.15)',
                '--text-shadow': 'none'
            }
        };

        const DIFFICULTIES = {
            easy: { SPEED: 2.5, SPAWN_RATE: 110, GAP: 280, GRAVITY: 0.20 },
            normal: { SPEED: 4.5, SPAWN_RATE: 80, GAP: 200, GRAVITY: 0.28 },
            hard: { SPEED: 6.5, SPAWN_RATE: 55, GAP: 150, GRAVITY: 0.35 }
        };

        const SETTINGS = {
            MODE: 'zero-g', // 'zero-g' o 'gravity'
            OBSTACLE_TYPE: 'pipes', // 'pipes' o 'meteors'
            PHYSICS: {
                // Zero-G parametri
                MAX_VELOCITY: 15,
                ACCEL: 1.5,
                FRICTION: 0.88,
                // Gravità parametri (Modalità Classica)
                GRAVITY: DIFFICULTIES.normal.GRAVITY,
                JUMP: -6.5,
                DIVE: 5
            },
            WORLD: {
                PIPE_SPEED: DIFFICULTIES.normal.SPEED,
                PIPE_SPAWN_RATE: DIFFICULTIES.normal.SPAWN_RATE,
                PIPE_GAP: DIFFICULTIES.normal.GAP,
                PIPE_WIDTH: 80
            },
            THEME: { ...THEMES.matrix },
            MENU: {
                activeIndex: 0,
                items: [
                    { id: 'mode', label: 'Fisica', options: ['zero-g', 'gravity'], idx: 0 },
                    { id: 'obstacle', label: 'Ostacoli', options: ['pipes', 'meteors'], idx: 0 },
                    { id: 'theme', label: 'Tema', options: ['matrix', 'tokyo', 'material'], idx: 0 },
                    { id: 'difficulty', label: 'Difficoltà', options: ['easy', 'normal', 'hard'], idx: 1 },
                    { id: 'start', label: '>>> RUN_GAME.sh <<<', isAction: true }
                ]
            }
        };

        /**
         * GESTORE INPUT: Traccia se i tasti sono tenuti premuti per il movimento fluido
         * e invia eventi discreti per il Menu e la modalità Gravità.
         */
        class Controller {
            constructor(callbacks) {
                this.cb = callbacks;
                this.keys = { up: false, down: false };
                this.startY = 0;
                this._bindEvents();
            }

            _bindEvents() {
                window.addEventListener('keydown', e => {
                    // Notifica la pressione del tasto per il menu
                    this.cb.onKey(e.key);

                    if (e.key === 'k') {
                        if (!this.keys.up) this.cb.onAction('jump');
                        this.keys.up = true;
                    }
                    if (e.key === 'j') {
                        if (!this.keys.down) this.cb.onAction('dive');
                        this.keys.down = true;
                    }
                });

                window.addEventListener('keyup', e => {
                    if (e.key === 'k') this.keys.up = false;
                    if (e.key === 'j') this.keys.down = false;
                });

                window.addEventListener('touchstart', e => {
                    if (e.target.tagName === 'BUTTON' || e.target.closest('.menu-row')) return;
                    this.startY = e.touches[0].clientY;
                }, { passive: false });

                window.addEventListener('touchend', e => {
                    if (e.target.tagName === 'BUTTON' || e.target.closest('.menu-row')) return;
                    const endY = e.changedTouches[0].clientY;
                    const delta = this.startY - endY;
                    
                    if (delta > 30) this.cb.onAction('swipe-up');
                    else if (delta < -30) this.cb.onAction('swipe-down');
                    else this.cb.onAction('jump'); // Un tap agisce come salto
                }, { passive: false });
            }
        }

        /**
         * ENTITÀ: GIOCATORE
         */
        class Player {
            constructor(h) {
                this.x = 80;
                this.y = h / 2;
                this.v = 0;
                this.size = 28;
            }

            update(h, inputKeys, actionEvent) {
                if (SETTINGS.MODE === 'gravity') {
                    // Modalità GRAVITA': Eventi discreti e caduta costante
                    if (actionEvent === 'jump' || actionEvent === 'swipe-up') this.v = SETTINGS.PHYSICS.JUMP;
                    if (actionEvent === 'dive' || actionEvent === 'swipe-down') this.v += SETTINGS.PHYSICS.DIVE;

                    this.v += SETTINGS.PHYSICS.GRAVITY;
                    
                    if (this.v > SETTINGS.PHYSICS.MAX_VELOCITY) this.v = SETTINGS.PHYSICS.MAX_VELOCITY;
                    this.y += this.v;
                } else {
                    // Modalità ZERO-G: Accelerazione continua con attrito
                    if (inputKeys.up) this.v -= SETTINGS.PHYSICS.ACCEL;
                    if (inputKeys.down) this.v += SETTINGS.PHYSICS.ACCEL;

                    if (actionEvent === 'swipe-up') this.v -= 12;
                    if (actionEvent === 'swipe-down') this.v += 12;
                    if (actionEvent === 'jump') this.v -= 5; // Un tap dà una piccola spinta

                    if (this.v > SETTINGS.PHYSICS.MAX_VELOCITY) this.v = SETTINGS.PHYSICS.MAX_VELOCITY;
                    if (this.v < -SETTINGS.PHYSICS.MAX_VELOCITY) this.v = -SETTINGS.PHYSICS.MAX_VELOCITY;

                    this.v *= SETTINGS.PHYSICS.FRICTION;
                    this.y += this.v;
                }

                // Toccare i bordi è SEGFAULT (Game Over)
                if (this.y + this.size > h || this.y < 0) return true; 
                
                return false;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = SETTINGS.THEME['--primary-color'];
                ctx.font = `bold ${this.size}px ${SETTINGS.THEME['--font-family']}`;
                
                // Effetto scia
                ctx.globalAlpha = 0.3;
                ctx.fillText('>', this.x - Math.max(10, Math.abs(this.v)), this.y + this.size);
                ctx.globalAlpha = 1.0;
                ctx.fillText('>', this.x, this.y + this.size);
                ctx.restore();
            }
        }

        /**
         * ENTITÀ: OSTACOLO (TUBI)
         */
        class Pipe {
            constructor(w, h) {
                this.x = w;
                this.w = SETTINGS.WORLD.PIPE_WIDTH;
                this.top = Math.random() * (h / 2) + 60;
                this.gap = SETTINGS.WORLD.PIPE_GAP;
                this.passed = false;
            }

            update() { this.x -= SETTINGS.WORLD.PIPE_SPEED; }

            draw(ctx, h) {
                ctx.fillStyle = SETTINGS.THEME['--secondary-color'];
                ctx.strokeStyle = SETTINGS.THEME['--primary-color'];
                ctx.lineWidth = 2;

                // Superiore
                ctx.fillRect(this.x, 0, this.w, this.top);
                ctx.strokeRect(this.x, 0, this.w, this.top);

                // Inferiore
                const bY = this.top + this.gap;
                const bH = h - bY;
                ctx.fillRect(this.x, bY, this.w, bH);
                ctx.strokeRect(this.x, bY, this.w, bH);

                // Decorazione testo sui tubi
                ctx.fillStyle = SETTINGS.THEME['--text-color'];
                ctx.font = `10px ${SETTINGS.THEME['--font-family']}`;
                if (SETTINGS.THEME['--text-color'] !== '#212121') { // Nascondi testo nel material design
                    ctx.fillText('while(1)', this.x + 10, this.top - 10);
                    ctx.fillText('return 0', this.x + 10, bY + 20);
                }
            }

            collides(p, h) {
                if (p.x + p.size > this.x && p.x < this.x + this.w) {
                    if (p.y < this.top || p.y + p.size > this.top + this.gap) return true;
                }
                return false;
            }
        }

        /**
         * ENTITÀ: METEORITE
         */
        class Meteor {
            constructor(w, h) {
                this.x = w;
                this.y = Math.random() * (h - 60) + 30; // Altezza casuale
                this.size = 30 + Math.random() * 25; // Dimensione variabile (30 - 55)
                this.speed = SETTINGS.WORLD.PIPE_SPEED * (1.2 + Math.random() * 0.6); // Più veloci e velocità variabile
                this.passed = false;
                this.w = this.size; // usato per capire se è uscito dallo schermo
            }

            update() { this.x -= this.speed; }

            draw(ctx, h) {
                ctx.fillStyle = SETTINGS.THEME['--secondary-color'];
                ctx.strokeStyle = SETTINGS.THEME['--primary-color'];
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = SETTINGS.THEME['--text-color'];
                ctx.font = `bold ${this.size * 0.6}px ${SETTINGS.THEME['--font-family']}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                if (SETTINGS.THEME['--text-color'] !== '#212121') { 
                    ctx.fillText('*', this.x, this.y + 4);
                }
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            }

            collides(p, h) {
                // Approssimazione di collisione circolare tra il cursore ">" e il meteorite
                const pCenter = { x: p.x + p.size * 0.4, y: p.y + p.size * 0.6 }; 
                const dx = pCenter.x - this.x;
                const dy = pCenter.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                return dist < (this.size / 2 + p.size * 0.3);
            }
        }

        /**
         * CORE ENGINE
         */
        let game;
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.state = 'MENU';
                this.score = 0;
                this.obstacles = [];
                this.ticks = 0;
                this.currentAction = null;

                this.player = new Player(this.canvas.height);
                this.input = new Controller({
                    onKey: (k) => this.handleKey(k),
                    onAction: (act) => this.currentAction = act
                });

                this._setupUI();
                this.renderMenu();
                window.addEventListener('resize', () => this.onResize());
                this.onResize();
                this.run();
            }

            _setupUI() {
                // Collega solo il pulsante di Game Over
                document.getElementById('btn-menu').addEventListener('click', () => this.goToMenu());
            }

            handleKey(key) {
                if (this.state === 'MENU') {
                    this.handleMenuNavigation(key);
                } else if (this.state === 'GAMEOVER') {
                    if (key === 'm') this.goToMenu();
                    if (key === 'k' || key === 'Enter') this.start();
                }
            }

            handleMenuNavigation(key) {
                const menu = SETTINGS.MENU;
                const item = menu.items[menu.activeIndex];

                if (key === 'j' || key === 'ArrowDown') {
                    menu.activeIndex = (menu.activeIndex + 1) % menu.items.length;
                } else if (key === 'k' || key === 'ArrowUp') {
                    menu.activeIndex = (menu.activeIndex - 1 + menu.items.length) % menu.items.length;
                } else if (key === 'h' || key === 'ArrowLeft') {
                    if (!item.isAction) {
                        item.idx = (item.idx - 1 + item.options.length) % item.options.length;
                        this.applyMenuSetting(item);
                    }
                } else if (key === 'l' || key === 'ArrowRight') {
                    if (!item.isAction) {
                        item.idx = (item.idx + 1) % item.options.length;
                        this.applyMenuSetting(item);
                    }
                } else if (key === 'Enter' || key === ' ') {
                    if (item.isAction) this.start();
                    else {
                        item.idx = (item.idx + 1) % item.options.length;
                        this.applyMenuSetting(item);
                    }
                }
                this.renderMenu();
            }

            handleMenuClick(index) {
                if (this.state !== 'MENU') return;
                const menu = SETTINGS.MENU;
                
                if (menu.activeIndex === index) {
                    // Clic su riga già attiva: cicla le opzioni o avvia
                    const item = menu.items[index];
                    if (item.isAction) this.start();
                    else {
                        item.idx = (item.idx + 1) % item.options.length;
                        this.applyMenuSetting(item);
                    }
                } else {
                    // Seleziona nuova riga
                    menu.activeIndex = index;
                }
                this.renderMenu();
            }

            applyMenuSetting(item) {
                const val = item.options[item.idx];
                if (item.id === 'mode') SETTINGS.MODE = val;
                else if (item.id === 'obstacle') SETTINGS.OBSTACLE_TYPE = val;
                else if (item.id === 'theme') this.setTheme(val);
                else if (item.id === 'difficulty') this.setDifficulty(val);
            }

            renderMenu() {
                const container = document.getElementById('vim-menu');
                if(!container) return;
                container.innerHTML = '';
                
                SETTINGS.MENU.items.forEach((item, index) => {
                    const isActive = index === SETTINGS.MENU.activeIndex;
                    const row = document.createElement('div');
                    row.className = `menu-row ${isActive ? 'active' : ''}`;
                    row.onclick = () => this.handleMenuClick(index);

                    const cursor = `<span class="menu-cursor">${isActive ? '>' : '&nbsp;'}</span>`;
                    
                    if (item.isAction) {
                        row.innerHTML = `${cursor}<span class="menu-value font-bold">${item.label}</span>`;
                    } else {
                        // Evidenzia l'opzione correntemente selezionata con le parentesi
                        const optsHtml = item.options.map((opt, i) => {
                            return i === item.idx 
                                ? `<span class="menu-value">[${opt.toUpperCase()}]</span>` 
                                : `<span class="menu-value-dim">${opt}</span>`;
                        }).join(' &nbsp; ');
                        
                        row.innerHTML = `${cursor}<span class="menu-label">${item.label}:</span> ${optsHtml}`;
                    }
                    container.appendChild(row);
                });
            }

            setTheme(themeName) {
                const theme = THEMES[themeName];
                SETTINGS.THEME = { ...theme };
                
                for (let key in theme) {
                    document.documentElement.style.setProperty(key, theme[key]);
                }
            }

            goToMenu() {
                if (this.state === 'GAMEOVER') {
                    this.state = 'MENU';
                    document.getElementById('game-over').classList.add('hidden');
                    document.getElementById('hud').classList.add('hidden');
                    document.getElementById('menu').classList.remove('hidden');
                    this.obstacles = [];
                    this.player = new Player(this.canvas.height);
                }
            }

            setDifficulty(level) {
                if (this.state === 'PLAYING') return;
                const diff = DIFFICULTIES[level];
                SETTINGS.WORLD.PIPE_SPEED = diff.SPEED;
                SETTINGS.WORLD.PIPE_SPAWN_RATE = diff.SPAWN_RATE;
                SETTINGS.WORLD.PIPE_GAP = diff.GAP;
                SETTINGS.PHYSICS.GRAVITY = diff.GRAVITY;

                // RIMOSSO IL CODICE CHE CERCAVA I VECCHI PULSANTI
            }

            onResize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            handleInteraction() {
                if (this.state !== 'PLAYING') this.start();
            }

            start() {
                this.state = 'PLAYING';
                this.score = 0;
                this.obstacles = [];
                this.player = new Player(this.canvas.height);
                this.ticks = 0;
                this.currentAction = null;
                
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('game-over').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                this.syncUI();
            }

            syncUI() {
                document.getElementById('current-score').innerText = this.score;
            }

            die() {
                this.state = 'GAMEOVER';
                document.getElementById('game-over').classList.remove('hidden');
                document.getElementById('final-score').innerText = `SCORE: ${this.score}`;
            }

            update() {
                if (this.state !== 'PLAYING') return;

                // Passiamo i tasti per Zero-G e l'azione singola (salto/scatto)
                if (this.player.update(this.canvas.height, this.input.keys, this.currentAction)) {
                    this.die();
                }
                this.currentAction = null; // Resetta l'azione dopo il frame

                if (SETTINGS.OBSTACLE_TYPE === 'pipes') {
                    if (this.ticks % SETTINGS.WORLD.PIPE_SPAWN_RATE === 0) {
                        this.obstacles.push(new Pipe(this.canvas.width, this.canvas.height));
                    }
                } else {
                    // Spawn Meteoriti: più frequenti, viaggiano casualmente
                    const meteorSpawnRate = Math.max(20, Math.floor(SETTINGS.WORLD.PIPE_SPAWN_RATE / 2.5));
                    if (this.ticks % meteorSpawnRate === 0) {
                        const count = Math.random() > 0.7 ? 2 : 1; // 30% di probabilità di spawnare 2 meteoriti assieme
                        for(let m=0; m<count; m++) {
                            // Sfasa leggermente l'asse X se ne spawnano multipli per non sovrapporli perfettamente
                            this.obstacles.push(new Meteor(this.canvas.width + (m * Math.random() * 80), this.canvas.height));
                        }
                    }
                }

                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    o.update();

                    if (o.collides(this.player, this.canvas.height)) this.die();

                    if (!o.passed && o.x + o.w < this.player.x) {
                        o.passed = true;
                        this.score++;
                        this.syncUI();
                    }

                    if (o.x + o.w < 0) this.obstacles.splice(i, 1);
                }
                this.ticks++;
            }

            render() {
                const { ctx, canvas } = this;
                
                ctx.fillStyle = SETTINGS.THEME['--bg-color'];
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = SETTINGS.THEME['--grid-color'];
                ctx.lineWidth = 1;
                for(let x=0; x<canvas.width; x+=60) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                }
                for(let y=0; y<canvas.height; y+=60) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                }

                this.obstacles.forEach(o => o.draw(ctx, canvas.height));
                this.player.draw(ctx);
            }

            run() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.run());
            }
        }

        window.addEventListener('load', () => {
            game = new GameEngine();
        });
    </script>
</body>
</html>
