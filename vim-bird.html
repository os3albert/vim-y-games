<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vim-y Bird - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import Font: Fira Code per TUI, Roboto per Material */
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Roboto:wght@400;700&display=swap');
        
        :root {
            --bg-color: #0d0d0d;
            --primary-color: #00ff41;
            --secondary-color: #003300;
            --grid-color: #001a00;
            --card-bg: rgba(0, 0, 0, 0.9);
            --text-color: #00ff41;
            --font-family: 'Fira Code', monospace;
            --crt-display: block;
            --border-color: #00ff41;
            --shadow-color: rgba(0, 255, 65, 0.2);
            --text-shadow: 0 0 5px var(--primary-color);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            touch-action: none;
            transition: background-color 0.3s, color 0.3s;
        }

        canvas { display: block; }

        /* UI Overlay Layer */
        .ui-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-shadow: var(--text-shadow);
        }

        .retro-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 2.5rem;
            text-align: center;
            pointer-events: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px var(--shadow-color);
            transition: all 0.3s ease;
        }

        /* Stili per i bottoni */
        .custom-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
            color: var(--text-color);
            transition: all 0.2s ease;
            cursor: pointer;
            background: transparent;
        }
        .custom-btn:hover { background: var(--secondary-color); }
        .custom-btn.active { 
            background: var(--primary-color); 
            color: var(--bg-color); 
            text-shadow: none;
        }
        
        /* Contenitori informativi */
        .info-box {
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 0.25rem;
            background: rgba(0,0,0,0.1);
        }
        .info-title {
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.5rem;
            padding-bottom: 0.25rem;
        }
        .key-badge {
            background: var(--primary-color);
            color: var(--bg-color);
            padding: 0 0.25rem;
            font-weight: bold;
            text-shadow: none;
        }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Effetto CRT opzionale */
        .crt-overlay::before {
            content: " ";
            display: var(--crt-display);
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="crt-overlay">

    <div class="ui-container">
        <!-- Menu Principale -->
        <div id="menu" class="retro-card">
            <h1 class="text-6xl font-bold mb-2 tracking-tighter">VIM-Y BIRD</h1>
            <p class="mb-6 opacity-70">Senza gravità: muoviti liberamente!</p>
            
            <div class="grid grid-cols-2 gap-4 text-left mb-6 text-sm md:text-base">
                <div class="info-box">
                    <p class="info-title">Comandi</p>
                    <p>⌨️ <span class="key-badge">k</span> : Muovi Su</p>
                    <p>⌨️ <span class="key-badge">j</span> : Muovi Giù</p>
                </div>
                <div class="info-box">
                    <p class="info-title">Mobile</p>
                    <p>📱 Swipe Su: Scatto Su</p>
                    <p>📱 Swipe Giu: Scatto Giù</p>
                </div>
            </div>

            <!-- Selezione Tema -->
            <div class="mb-6">
                <p class="font-bold mb-2 text-sm uppercase tracking-widest opacity-80">Tema</p>
                <div class="flex justify-center space-x-4 text-sm font-bold">
                    <button id="btn-theme-matrix" class="custom-btn active" onclick="game.setTheme('matrix')">Matrix</button>
                    <button id="btn-theme-tokyo" class="custom-btn" onclick="game.setTheme('tokyo')">Tokyo</button>
                    <button id="btn-theme-material" class="custom-btn" onclick="game.setTheme('material')">Material</button>
                </div>
            </div>

            <!-- Selezione Difficoltà -->
            <div class="mb-6">
                <p class="font-bold mb-2 text-sm uppercase tracking-widest opacity-80">Difficoltà</p>
                <div class="flex justify-center space-x-4 text-sm font-bold">
                    <button id="btn-easy" class="custom-btn">1. N00b</button>
                    <button id="btn-normal" class="custom-btn active">2. Hacker</button>
                    <button id="btn-hard" class="custom-btn">3. Guru</button>
                </div>
            </div>

            <p class="blink text-xl uppercase font-bold tracking-widest mt-4">Premi 'k' o 'j' per iniziare</p>
        </div>
        
        <!-- Schermata Fine Partita -->
        <div id="game-over" class="retro-card hidden">
            <h2 class="text-5xl font-bold mb-2 text-red-500" style="text-shadow: none;">SEGFAULT!</h2>
            <p id="final-score" class="text-3xl mb-8">Score: 0</p>
            <div class="flex flex-col gap-4 items-center">
                <p class="blink text-lg">Premi 'k' per riavviare</p>
                <button id="btn-menu" class="custom-btn text-sm uppercase tracking-widest mt-2">Torna al Menu (m)</button>
            </div>
        </div>

        <!-- Score HUD -->
        <div id="hud" class="absolute top-10 left-10 text-4xl font-bold hidden tabular-nums">
            SCORE: <span id="current-score">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * DIZIONARIO TEMI
         */
        const THEMES = {
            matrix: {
                '--bg-color': '#0d0d0d',
                '--primary-color': '#00ff41',
                '--secondary-color': '#003300',
                '--grid-color': '#001a00',
                '--card-bg': 'rgba(0, 0, 0, 0.9)',
                '--text-color': '#00ff41',
                '--font-family': '"Fira Code", monospace',
                '--crt-display': 'block',
                '--border-color': '#00ff41',
                '--shadow-color': 'rgba(0, 255, 65, 0.2)',
                '--text-shadow': '0 0 5px var(--primary-color)'
            },
            tokyo: {
                '--bg-color': '#1a1b26',
                '--primary-color': '#7aa2f7',
                '--secondary-color': '#24283b',
                '--grid-color': '#414868',
                '--card-bg': 'rgba(26, 27, 38, 0.95)',
                '--text-color': '#c0caf5',
                '--font-family': '"Fira Code", monospace',
                '--crt-display': 'none',
                '--border-color': '#7aa2f7',
                '--shadow-color': 'rgba(122, 162, 247, 0.2)',
                '--text-shadow': 'none'
            },
            material: {
                '--bg-color': '#fafafa',
                '--primary-color': '#6200ea',
                '--secondary-color': '#e0e0e0',
                '--grid-color': '#eeeeee',
                '--card-bg': '#ffffff',
                '--text-color': '#212121',
                '--font-family': '"Roboto", sans-serif',
                '--crt-display': 'none',
                '--border-color': '#e0e0e0',
                '--shadow-color': 'rgba(0, 0, 0, 0.15)',
                '--text-shadow': 'none'
            }
        };

        const DIFFICULTIES = {
            easy: { SPEED: 2.5, SPAWN_RATE: 110, GAP: 280 },
            normal: { SPEED: 4.5, SPAWN_RATE: 80, GAP: 200 },
            hard: { SPEED: 6.5, SPAWN_RATE: 55, GAP: 150 }
        };

        const SETTINGS = {
            PHYSICS: {
                MAX_VELOCITY: 15,
                ACCEL: 1.5,
                FRICTION: 0.88 // Senza gravità, usiamo l'attrito per fermare dolcemente
            },
            WORLD: {
                PIPE_SPEED: DIFFICULTIES.normal.SPEED,
                PIPE_SPAWN_RATE: DIFFICULTIES.normal.SPAWN_RATE,
                PIPE_GAP: DIFFICULTIES.normal.GAP,
                PIPE_WIDTH: 80
            },
            THEME: { ...THEMES.matrix } // Inizializzato con i colori Matrix
        };

        /**
         * GESTORE INPUT: Traccia se i tasti sono tenuti premuti per il movimento fluido
         */
        class Controller {
            constructor(callbacks) {
                this.cb = callbacks;
                this.keys = { up: false, down: false };
                this.startY = 0;
                this._bindEvents();
            }

            _bindEvents() {
                window.addEventListener('keydown', e => {
                    if (e.key === 'k') this.keys.up = true;
                    if (e.key === 'j') this.keys.down = true;
                    
                    if (e.key === '1') this.cb.onDiff('easy');
                    if (e.key === '2') this.cb.onDiff('normal');
                    if (e.key === '3') this.cb.onDiff('hard');
                    if (e.key === 'm') this.cb.onMenu();
                    
                    // Avvia il gioco se premiamo i controlli di movimento
                    if (e.key === 'k' || e.key === 'j') this.cb.onAny(); 
                });

                window.addEventListener('keyup', e => {
                    if (e.key === 'k') this.keys.up = false;
                    if (e.key === 'j') this.keys.down = false;
                });

                window.addEventListener('touchstart', e => {
                    if (e.target.tagName === 'BUTTON') return;
                    this.startY = e.touches[0].clientY;
                    this.cb.onAny();
                }, { passive: false });

                window.addEventListener('touchend', e => {
                    if (e.target.tagName === 'BUTTON') return;
                    const endY = e.changedTouches[0].clientY;
                    const delta = this.startY - endY;
                    
                    if (delta > 30) this.cb.onSwipe('up');
                    else if (delta < -30) this.cb.onSwipe('down');
                }, { passive: false });
            }
        }

        /**
         * ENTITÀ: GIOCATORE
         */
        class Player {
            constructor(h) {
                this.x = 80;
                this.y = h / 2;
                this.v = 0;
                this.size = 28;
            }

            update(h, inputKeys, swipeEvent) {
                // Accelerazione basata sulla pressione dei tasti
                if (inputKeys.up) this.v -= SETTINGS.PHYSICS.ACCEL;
                if (inputKeys.down) this.v += SETTINGS.PHYSICS.ACCEL;

                // Gestione impulsi da Swipe (Mobile)
                if (swipeEvent === 'up') this.v -= 12;
                if (swipeEvent === 'down') this.v += 12;

                // Limita velocità massima
                if (this.v > SETTINGS.PHYSICS.MAX_VELOCITY) this.v = SETTINGS.PHYSICS.MAX_VELOCITY;
                if (this.v < -SETTINGS.PHYSICS.MAX_VELOCITY) this.v = -SETTINGS.PHYSICS.MAX_VELOCITY;

                // Applica Attrito e muovi
                this.v *= SETTINGS.PHYSICS.FRICTION;
                this.y += this.v;

                // Toccare i bordi è SEGFAULT (Game Over)
                if (this.y + this.size > h || this.y < 0) return true; 
                
                return false;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = SETTINGS.THEME['--primary-color'];
                ctx.font = `bold ${this.size}px ${SETTINGS.THEME['--font-family']}`;
                
                // Effetto scia
                ctx.globalAlpha = 0.3;
                ctx.fillText('>', this.x - Math.max(10, Math.abs(this.v)), this.y + this.size);
                ctx.globalAlpha = 1.0;
                ctx.fillText('>', this.x, this.y + this.size);
                ctx.restore();
            }
        }

        /**
         * ENTITÀ: OSTACOLO
         */
        class Obstacle {
            constructor(w, h) {
                this.x = w;
                this.w = SETTINGS.WORLD.PIPE_WIDTH;
                this.top = Math.random() * (h / 2) + 60;
                this.gap = SETTINGS.WORLD.PIPE_GAP;
                this.passed = false;
            }

            update() { this.x -= SETTINGS.WORLD.PIPE_SPEED; }

            draw(ctx, h) {
                ctx.fillStyle = SETTINGS.THEME['--secondary-color'];
                ctx.strokeStyle = SETTINGS.THEME['--primary-color'];
                ctx.lineWidth = 2;

                // Superiore
                ctx.fillRect(this.x, 0, this.w, this.top);
                ctx.strokeRect(this.x, 0, this.w, this.top);

                // Inferiore
                const bY = this.top + this.gap;
                const bH = h - bY;
                ctx.fillRect(this.x, bY, this.w, bH);
                ctx.strokeRect(this.x, bY, this.w, bH);

                // Decorazione testo sui tubi
                ctx.fillStyle = SETTINGS.THEME['--text-color'];
                ctx.font = `10px ${SETTINGS.THEME['--font-family']}`;
                if (SETTINGS.THEME['--text-color'] !== '#212121') { // Nascondi testo nel material design
                    ctx.fillText('while(1)', this.x + 10, this.top - 10);
                    ctx.fillText('return 0', this.x + 10, bY + 20);
                }
            }

            collides(p, h) {
                if (p.x + p.size > this.x && p.x < this.x + this.w) {
                    if (p.y < this.top || p.y + p.size > this.top + this.gap) return true;
                }
                return false;
            }
        }

        /**
         * CORE ENGINE
         */
        let game;
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.state = 'MENU';
                this.score = 0;
                this.obstacles = [];
                this.ticks = 0;
                this.currentSwipe = null;

                this.player = new Player(this.canvas.height);
                this.input = new Controller({
                    onAny: () => this.handleInteraction(),
                    onDiff: (level) => this.setDifficulty(level),
                    onMenu: () => this.goToMenu(),
                    onSwipe: (dir) => this.currentSwipe = dir
                });

                this._setupUI();
                window.addEventListener('resize', () => this.onResize());
                this.onResize();
                this.run();
            }

            _setupUI() {
                document.getElementById('btn-easy').addEventListener('click', () => this.setDifficulty('easy'));
                document.getElementById('btn-normal').addEventListener('click', () => this.setDifficulty('normal'));
                document.getElementById('btn-hard').addEventListener('click', () => this.setDifficulty('hard'));
                document.getElementById('btn-menu').addEventListener('click', () => this.goToMenu());
            }

            setTheme(themeName) {
                const theme = THEMES[themeName];
                SETTINGS.THEME = { ...theme };
                
                // Aggiorna variabili CSS globali
                for (let key in theme) {
                    document.documentElement.style.setProperty(key, theme[key]);
                }

                // Aggiorna UI Bottoni
                ['matrix', 'tokyo', 'material'].forEach(t => {
                    document.getElementById(`btn-theme-${t}`).classList.remove('active');
                });
                document.getElementById(`btn-theme-${themeName}`).classList.add('active');
            }

            goToMenu() {
                if (this.state === 'GAMEOVER') {
                    this.state = 'MENU';
                    document.getElementById('game-over').classList.add('hidden');
                    document.getElementById('hud').classList.add('hidden');
                    document.getElementById('menu').classList.remove('hidden');
                    this.obstacles = [];
                    this.player = new Player(this.canvas.height);
                }
            }

            setDifficulty(level) {
                if (this.state === 'PLAYING') return;
                const diff = DIFFICULTIES[level];
                SETTINGS.WORLD.PIPE_SPEED = diff.SPEED;
                SETTINGS.WORLD.PIPE_SPAWN_RATE = diff.SPAWN_RATE;
                SETTINGS.WORLD.PIPE_GAP = diff.GAP;

                ['easy', 'normal', 'hard'].forEach(l => {
                    document.getElementById(`btn-${l}`).classList.remove('active');
                });
                document.getElementById(`btn-${level}`).classList.add('active');
            }

            onResize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            handleInteraction() {
                if (this.state !== 'PLAYING') this.start();
            }

            start() {
                this.state = 'PLAYING';
                this.score = 0;
                this.obstacles = [];
                this.player = new Player(this.canvas.height);
                this.ticks = 0;
                this.currentSwipe = null;
                
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('game-over').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                this.syncUI();
            }

            syncUI() {
                document.getElementById('current-score').innerText = this.score;
            }

            die() {
                this.state = 'GAMEOVER';
                document.getElementById('game-over').classList.remove('hidden');
                document.getElementById('final-score').innerText = `SCORE: ${this.score}`;
            }

            update() {
                if (this.state !== 'PLAYING') return;

                // Passiamo le key attuali e gli eventi swipe consumabili
                if (this.player.update(this.canvas.height, this.input.keys, this.currentSwipe)) {
                    this.die(); // Muore se tocca bordi
                }
                this.currentSwipe = null; // Resetta lo swipe dopo averlo usato

                if (this.ticks % SETTINGS.WORLD.PIPE_SPAWN_RATE === 0) {
                    this.obstacles.push(new Obstacle(this.canvas.width, this.canvas.height));
                }

                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    o.update();

                    if (o.collides(this.player, this.canvas.height)) this.die();

                    if (!o.passed && o.x + o.w < this.player.x) {
                        o.passed = true;
                        this.score++;
                        this.syncUI();
                    }

                    if (o.x + o.w < 0) this.obstacles.splice(i, 1);
                }
                this.ticks++;
            }

            render() {
                const { ctx, canvas } = this;
                
                ctx.fillStyle = SETTINGS.THEME['--bg-color'];
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = SETTINGS.THEME['--grid-color'];
                ctx.lineWidth = 1;
                for(let x=0; x<canvas.width; x+=60) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                }
                for(let y=0; y<canvas.height; y+=60) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                }

                this.obstacles.forEach(o => o.draw(ctx, canvas.height));
                this.player.draw(ctx);
            }

            run() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.run());
            }
        }

        window.addEventListener('load', () => {
            game = new GameEngine();
        });
    </script>
</body>
</html>
