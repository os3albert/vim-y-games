<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vim-y Bird - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root {
            --matrix-green: #00ff41;
            --matrix-dark: #003300;
            --matrix-bg: #0d0d0d;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--matrix-bg);
            font-family: 'Fira Code', monospace;
            touch-action: none; /* Impedisce lo scroll del browser su mobile */
        }

        canvas { display: block; }

        /* UI Overlay Layer */
        .ui-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--matrix-green);
            text-shadow: 0 0 5px var(--matrix-green);
        }

        .retro-card {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--matrix-green);
            padding: 2.5rem;
            text-align: center;
            pointer-events: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Effetto CRT opzionale */
        .crt-overlay::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="crt-overlay">

    <div class="ui-container">
        <!-- Menu Principale -->
        <div id="menu" class="retro-card">
            <h1 class="text-6xl font-bold mb-2 tracking-tighter">VIM-Y BIRD</h1>
            <p class="mb-8 opacity-70">Esci dal buffer infinito</p>
            
            <div class="grid grid-cols-2 gap-4 text-left mb-10 text-sm md:text-base">
                <div class="border border-[#00ff41]/30 p-3 rounded">
                    <p class="font-bold border-b border-[#00ff41]/30 mb-2">Comandi</p>
                    <p>⌨️ <span class="bg-[#00ff41] text-black px-1 font-bold">k</span> : Salta</p>
                    <p>⌨️ <span class="bg-[#00ff41] text-black px-1 font-bold">j</span> : Picchiata</p>
                </div>
                <div class="border border-[#00ff41]/30 p-3 rounded">
                    <p class="font-bold border-b border-[#00ff41]/30 mb-2">Mobile</p>
                    <p>📱 Swipe Su/Giu</p>
                    <p>📱 Tap per Salto</p>
                </div>
            </div>

            <!-- Selezione Difficoltà -->
            <div class="mb-8">
                <p class="font-bold mb-3 text-sm uppercase tracking-widest text-[#00ff41]/80">Difficoltà (Premi 1, 2, 3)</p>
                <div class="flex justify-center space-x-4 text-sm font-bold">
                    <button id="btn-easy" class="px-4 py-2 border border-[#00ff41] rounded transition-colors hover:bg-[#00ff41]/20 focus:outline-none">1. N00b</button>
                    <button id="btn-normal" class="px-4 py-2 border border-[#00ff41] bg-[#00ff41] text-black rounded transition-colors focus:outline-none">2. Hacker</button>
                    <button id="btn-hard" class="px-4 py-2 border border-[#00ff41] rounded transition-colors hover:bg-[#00ff41]/20 focus:outline-none">3. Guru</button>
                </div>
            </div>

            <p class="blink text-xl uppercase font-bold tracking-widest">Premi 'k' per iniziare</p>
        </div>
        
        <!-- Schermata Fine Partita -->
        <div id="game-over" class="retro-card hidden">
            <h2 class="text-5xl font-bold mb-2 text-red-600">SEGFAULT!</h2>
            <p id="final-score" class="text-3xl mb-8">Score: 0</p>
            <div class="flex flex-col gap-4 items-center">
                <p class="blink text-lg">Premi 'k' per riavviare</p>
                <button id="btn-menu" class="px-6 py-2 border border-[#00ff41] rounded transition-colors hover:bg-[#00ff41]/20 focus:outline-none text-sm uppercase tracking-widest mt-2">Torna al Menu (m)</button>
            </div>
        </div>

        <!-- Score HUD -->
        <div id="hud" class="absolute top-10 left-10 text-4xl font-bold hidden tabular-nums">
            SCORE: <span id="current-score">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        /**
         * COSTANTI DI SISTEMA E DIFFICOLTÀ
         */
        const DIFFICULTIES = {
            easy: { SPEED: 2.5, SPAWN_RATE: 110, GAP: 260, GRAVITY: 0.22 },
            normal: { SPEED: 4, SPAWN_RATE: 85, GAP: 200, GRAVITY: 0.28 },
            hard: { SPEED: 6, SPAWN_RATE: 60, GAP: 150, GRAVITY: 0.35 }
        };

        const SETTINGS = {
            PHYSICS: {
                GRAVITY: DIFFICULTIES.normal.GRAVITY,
                JUMP: -6.5,
                DIVE: 5,
                MAX_VELOCITY: 12
            },
            WORLD: {
                PIPE_SPEED: DIFFICULTIES.normal.SPEED,
                PIPE_SPAWN_RATE: DIFFICULTIES.normal.SPAWN_RATE,
                PIPE_GAP: DIFFICULTIES.normal.GAP,
                PIPE_WIDTH: 80
            },
            THEME: {
                PRIMARY: '#00ff41',
                SECONDARY: '#003300',
                BG: '#0d0d0d',
                GRID: '#001a00'
            }
        };

        /**
         * GESTORE INPUT (Tastiera + Touch)
         */
        class Controller {
            constructor(callbacks) {
                this.cb = callbacks;
                this.startY = 0;
                this._bindEvents();
            }

            _bindEvents() {
                window.addEventListener('keydown', e => {
                    if (e.key === 'k') this.cb.onUp();
                    if (e.key === 'j') this.cb.onDown();
                    if (e.key === '1') this.cb.onDiff('easy');
                    if (e.key === '2') this.cb.onDiff('normal');
                    if (e.key === '3') this.cb.onDiff('hard');
                    if (e.key === 'm') this.cb.onMenu();
                });

                window.addEventListener('touchstart', e => {
                    if (e.target.tagName === 'BUTTON') return; // Ignora i tocchi sui bottoni della UI
                    this.startY = e.touches[0].clientY;
                    this.cb.onAny();
                }, { passive: false });

                window.addEventListener('touchend', e => {
                    if (e.target.tagName === 'BUTTON') return;
                    const endY = e.changedTouches[0].clientY;
                    const delta = this.startY - endY;
                    
                    if (Math.abs(delta) > 30) {
                        delta > 0 ? this.cb.onUp() : this.cb.onDown();
                    } else {
                        this.cb.onUp(); // Tap = Salto
                    }
                }, { passive: false });
            }
        }

        /**
         * ENTITÀ: GIOCATORE (Vim Cursor)
         */
        class Player {
            constructor(h) {
                this.x = 80;
                this.y = h / 2;
                this.v = 0;
                this.size = 28;
            }

            update(h) {
                this.v += SETTINGS.PHYSICS.GRAVITY;
                if (this.v > SETTINGS.PHYSICS.MAX_VELOCITY) this.v = SETTINGS.PHYSICS.MAX_VELOCITY;
                this.y += this.v;

                if (this.y + this.size > h) return true; // Collisione suolo
                if (this.y < 0) { this.y = 0; this.v = 0; }
                return false;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = SETTINGS.THEME.PRIMARY;
                ctx.font = `bold ${this.size}px "Fira Code"`;
                
                // Effetto scia
                ctx.globalAlpha = 0.3;
                ctx.fillText('>', this.x - 10, this.y + this.size);
                ctx.globalAlpha = 1.0;
                ctx.fillText('>', this.x, this.y + this.size);
                ctx.restore();
            }
        }

        /**
         * ENTITÀ: OSTACOLO (Code Block)
         */
        class Obstacle {
            constructor(w, h) {
                this.x = w;
                this.w = SETTINGS.WORLD.PIPE_WIDTH;
                this.top = Math.random() * (h / 2) + 60;
                this.gap = SETTINGS.WORLD.PIPE_GAP;
                this.passed = false;
            }

            update() { this.x -= SETTINGS.WORLD.PIPE_SPEED; }

            draw(ctx, h) {
                ctx.fillStyle = SETTINGS.THEME.SECONDARY;
                ctx.strokeStyle = SETTINGS.THEME.PRIMARY;
                ctx.lineWidth = 2;

                // Superiore
                ctx.fillRect(this.x, 0, this.w, this.top);
                ctx.strokeRect(this.x, 0, this.w, this.top);

                // Inferiore
                const bY = this.top + this.gap;
                const bH = h - bY;
                ctx.fillRect(this.x, bY, this.w, bH);
                ctx.strokeRect(this.x, bY, this.w, bH);

                // Decorazione
                ctx.fillStyle = SETTINGS.THEME.PRIMARY;
                ctx.font = '10px "Fira Code"';
                ctx.fillText('while(1)', this.x + 10, this.top - 10);
                ctx.fillText('return 0', this.x + 10, bY + 20);
            }

            collides(p, h) {
                if (p.x + p.size > this.x && p.x < this.x + this.w) {
                    if (p.y < this.top || p.y + p.size > this.top + this.gap) return true;
                }
                return false;
            }
        }

        /**
         * CORE ENGINE
         */
        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.state = 'MENU';
                this.score = 0;
                this.obstacles = [];
                this.ticks = 0;

                this.player = new Player(this.canvas.height);
                this.input = new Controller({
                    onUp: () => this.jump(),
                    onDown: () => this.dive(),
                    onAny: () => this.handleInteraction(),
                    onDiff: (level) => this.setDifficulty(level),
                    onMenu: () => this.goToMenu()
                });

                this._setupUI();
                window.addEventListener('resize', () => this.onResize());
                this.onResize();
                this.run();
            }

            _setupUI() {
                // Collega i bottoni del menu alla funzione di cambio difficoltà
                document.getElementById('btn-easy').addEventListener('click', () => this.setDifficulty('easy'));
                document.getElementById('btn-normal').addEventListener('click', () => this.setDifficulty('normal'));
                document.getElementById('btn-hard').addEventListener('click', () => this.setDifficulty('hard'));
                
                // Bottone per tornare al menu dal game over
                document.getElementById('btn-menu').addEventListener('click', () => this.goToMenu());
            }

            goToMenu() {
                if (this.state === 'GAMEOVER') {
                    this.state = 'MENU';
                    
                    // Cambia la visibilità dei pannelli UI
                    document.getElementById('game-over').classList.add('hidden');
                    document.getElementById('hud').classList.add('hidden');
                    document.getElementById('menu').classList.remove('hidden');
                    
                    // Resetta la schermata di sfondo ripulendola dagli ostacoli
                    this.obstacles = [];
                    this.player = new Player(this.canvas.height);
                    this.render();
                }
            }

            setDifficulty(level) {
                if (this.state === 'PLAYING') return; // Evita cambi di livello accidentali a partita in corso
                
                // Aggiorna la fisica del mondo in base al livello selezionato
                const diff = DIFFICULTIES[level];
                SETTINGS.PHYSICS.GRAVITY = diff.GRAVITY;
                SETTINGS.WORLD.PIPE_SPEED = diff.SPEED;
                SETTINGS.WORLD.PIPE_SPAWN_RATE = diff.SPAWN_RATE;
                SETTINGS.WORLD.PIPE_GAP = diff.GAP;

                // Aggiorna lo stile dei bottoni
                const activeClass = "px-4 py-2 border border-[#00ff41] bg-[#00ff41] text-black rounded transition-colors focus:outline-none";
                const inactiveClass = "px-4 py-2 border border-[#00ff41] rounded transition-colors hover:bg-[#00ff41]/20 focus:outline-none";
                
                document.getElementById('btn-easy').className = level === 'easy' ? activeClass : inactiveClass;
                document.getElementById('btn-normal').className = level === 'normal' ? activeClass : inactiveClass;
                document.getElementById('btn-hard').className = level === 'hard' ? activeClass : inactiveClass;
            }

            onResize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            handleInteraction() {
                if (this.state !== 'PLAYING') this.start();
            }

            jump() {
                if (this.state === 'PLAYING') this.player.v = SETTINGS.PHYSICS.JUMP;
                else this.start();
            }

            dive() {
                if (this.state === 'PLAYING') this.player.v += SETTINGS.PHYSICS.DIVE;
            }

            start() {
                this.state = 'PLAYING';
                this.score = 0;
                this.obstacles = [];
                this.player = new Player(this.canvas.height);
                this.ticks = 0;
                
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('game-over').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                this.syncUI();
            }

            syncUI() {
                document.getElementById('current-score').innerText = this.score;
            }

            die() {
                this.state = 'GAMEOVER';
                document.getElementById('game-over').classList.remove('hidden');
                document.getElementById('final-score').innerText = `SCORE: ${this.score}`;
            }

            update() {
                if (this.state !== 'PLAYING') return;

                if (this.player.update(this.canvas.height)) this.die();

                if (this.ticks % SETTINGS.WORLD.PIPE_SPAWN_RATE === 0) {
                    this.obstacles.push(new Obstacle(this.canvas.width, this.canvas.height));
                }

                for (let i = this.obstacles.length - 1; i >= 0; i--) {
                    const o = this.obstacles[i];
                    o.update();

                    if (o.collides(this.player, this.canvas.height)) this.die();

                    if (!o.passed && o.x + o.w < this.player.x) {
                        o.passed = true;
                        this.score++;
                        this.syncUI();
                    }

                    if (o.x + o.w < 0) this.obstacles.splice(i, 1);
                }
                this.ticks++;
            }

            render() {
                const { ctx, canvas } = this;
                
                // Background
                ctx.fillStyle = SETTINGS.THEME.BG;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Grid
                ctx.strokeStyle = SETTINGS.THEME.GRID;
                ctx.lineWidth = 1;
                for(let x=0; x<canvas.width; x+=60) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                }
                for(let y=0; y<canvas.height; y+=60) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                }

                this.obstacles.forEach(o => o.draw(ctx, canvas.height));
                this.player.draw(ctx);
            }

            run() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.run());
            }
        }

        // Lancio del gioco
        window.addEventListener('load', () => new GameEngine());
    </script>
</body>
</html>
